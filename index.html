<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a66c2">
  <title>Devika Sunitha - Technical Writing Team Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrapper">
    <header id="hero"></header>

    <main class="container">
      <section id="summary-section" hidden class="section">
        <div id="summary" class="summary-text"></div>
      </section>

      <section id="experience-section" hidden class="section">
        <h2>Work Experience</h2>
        <div id="work-list"></div>
      </section>

      <section id="education-section" hidden class="section">
        <h2>Education</h2>
        <div id="edu-list"></div>
      </section>

      <section id="skills-section" hidden class="section">
        <h2>Skills</h2>
        <div id="skill-list" class="skills-grid"></div>
      </section>

      <section id="certificates-section" hidden class="section">
        <h2>Certificates</h2>
        <div id="cert-list" class="certificates-list"></div>
      </section>

      <section id="languages-section" hidden class="section">
        <h2>Languages</h2>
        <div id="languages-list" class="languages-grid"></div>
      </section>

      <section id="contact-section" hidden class="section contact-section">
        <h2>Get In Touch</h2>
        <a id="contact-btn" class="btn btn-primary" href="#">Email me</a>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2025 Devika Sunitha. All rights reserved.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
